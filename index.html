<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día de la Mujer 🌸</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9ad5,#b57edc);
    color:white;
}

h1{
    margin-top:80px;
    font-size:50px;
    animation: brillo 2s infinite alternate;
}

@keyframes brillo{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

p{
    font-size:20px;
    width:60%;
    margin:auto;
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#b57edc;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* corazones cayendo */
.corazon{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation: caer 5s linear infinite;
}

@keyframes caer{
    to{
        transform:translateY(100vh);
    }
}
</style>
</head>

<body>

<h1>🌸 Feliz Día de la Mujer 🌸</h1>

<p>
Hoy celebramos la fuerza, valentía e inteligencia de todas las mujeres.
Gracias por inspirar al mundo cada día.
</p>

<button onclick="mensaje()">Ver mensaje especial</button>

<script>
function mensaje(){
    alert("✨ ¡Feliz Día de la Mujer! te deseo lo mejor mi querida, disfruta a lo maximo y no olvides que te quiero mucho.");
}

/* crear corazones */
setInterval(()=>{
    const corazon=document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML="💜";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.animationDuration=(Math.random()*3+3)+"s";

    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },5000);
},300);
</script>

</body>
</html>
